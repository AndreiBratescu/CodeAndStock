spring.application.name=stock

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/phone_accessories_stock
spring.datasource.username=postgres
spring.datasource.password=pass

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Timefold: solution, entity and constraint provider are in solverConfig.xml
# Terminare foarte rapidă: max 2s; oprire după 0.5s fără îmbunătățire
timefold.solver.termination.spent-limit=2s
timefold.solver.termination.unimproved-spent-limit=500ms
# Timefold configuration
timefold.solver.solver-config-xml=solverConfig.xml

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJwtTokenGenerationThisIsALongSecretKeyForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================
# Email Configuration
# ============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# App custom mail settings
app.mail.enabled=false
app.mail.from=${MAIL_USERNAME:noreply@codeandstock.local}

