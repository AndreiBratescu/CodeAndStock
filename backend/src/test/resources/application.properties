# Test Configuration - Uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Configuration for tests
jwt.secret=testSecretKeyForJwtTokenGenerationThisIsALongSecretKeyForHS256AlgorithmTesting
jwt.expiration=3600000
jwt.refresh.expiration=7200000

# Disable Timefold solver for tests
timefold.solver.solver-config-xml=

