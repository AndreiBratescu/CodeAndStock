# ============================
# DEV PROFILE - H2 In-Memory DB
# ============================
# Use this profile to run locally without PostgreSQL:
#   mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=dev

spring.datasource.url=jdbc:h2:mem:phone_accessories_stock;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Data initialization handled by DevDataInitializer.java (using proper BCrypt encoding)
spring.sql.init.mode=never

# H2 Console (browse DB at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Timefold configuration
timefold.solver.solver-config-xml=solverConfig.xml

# JWT Configuration (same as main)
jwt.secret=${JWT_SECRET:mySecretKeyForJwtTokenGenerationThisIsALongSecretKeyForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}
