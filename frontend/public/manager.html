<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Manager Produse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0f172a;
            --bg-alt: #020617;
            --card: #020617;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.1);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #ef4444;
            --border: #1f2937;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #020617 55%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        header span {
            font-size: 13px;
            color: var(--muted);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--accent-soft);
            background: rgba(15, 23, 42, 0.75);
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr);
            gap: 20px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .card {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.9));
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.9);
            padding: 18px 18px 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header h2 {
            font-size: 16px;
            font-weight: 500;
        }

        .pill {
            font-size: 11px;
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 13px;
        }

        thead {
            background: rgba(15, 23, 42, 0.9);
        }

        th, td {
            padding: 8px 6px;
            text-align: left;
            border-bottom: 1px solid rgba(31, 41, 55, 0.7);
        }

        th {
            font-weight: 500;
            color: var(--muted);
            font-size: 12px;
        }

        tbody tr:hover {
            background: rgba(15, 23, 42, 0.8);
        }

        .tag {
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.5);
            font-size: 11px;
            text-transform: lowercase;
        }

        .price {
            font-weight: 500;
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        button {
            border-radius: 999px;
            border: none;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--accent-soft);
            color: var(--accent);
        }

        button.secondary {
            background: rgba(15, 23, 42, 0.9);
            color: var(--muted);
            border: 1px solid rgba(55, 65, 81, 0.8);
        }

        button.danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 12px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            form {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 12px;
            color: var(--muted);
        }

        input, select {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 999px;
            border: 1px solid rgba(55, 65, 81, 0.9);
            padding: 7px 12px;
            color: var(--text);
            font-size: 13px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.5);
        }

        .form-footer {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .status {
            font-size: 12px;
            color: var(--muted);
        }

        .status.error {
            color: var(--danger);
        }

        .status.success {
            color: #4ade80;
        }
    </style>
</head>
<body>
<div class="shell">
    <header>
        <div>
            <h1>Manager Produse</h1>
            <span>Administrare catalog accesorii pentru toate standurile</span>
        </div>
        <div class="badge">
            <span style="width: 8px; height: 8px; border-radius: 999px; background: #22c55e;"></span>
            Backoffice manager
        </div>
    </header>

    <div class="layout">
        <section class="card">
            <div class="card-header">
                <h2>Produse existente</h2>
                <span class="pill muted" id="productCount">0 produse</span>
            </div>
            <table>
                <thead>
                <tr>
                    <th>SKU</th>
                    <th>Produs</th>
                    <th>Categorie</th>
                    <th>Model</th>
                    <th>Preț</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
        </section>

        <section class="card">
            <div class="card-header">
                <h2 id="formTitle">Adaugă produs</h2>
                <span class="pill muted" id="formSubtitle">SKU se generează automat</span>
            </div>

            <form id="productForm">
                <div class="field">
                    <label for="category">Categorie</label>
                    <select id="category" required></select>
                </div>

                <div class="field">
                    <label for="name">Nume afișat</label>
                    <input id="name" type="text" placeholder="ex: Husă MagSafe iPhone 15" required>
                </div>

                <div class="field">
                    <label for="brand">Brand</label>
                    <input id="brand" type="text" placeholder="ex: Apple" required>
                </div>

                <div class="field">
                    <label for="model">Model telefon</label>
                    <input id="model" type="text" placeholder="ex: iPhone 15" required>
                </div>

                <div class="field">
                    <label for="color">Culoare</label>
                    <input id="color" type="text" placeholder="ex: Red" required>
                </div>

                <div class="field">
                    <label for="price">Preț (lei)</label>
                    <input id="price" type="number" step="0.01" min="0" placeholder="ex: 129.99" required>
                </div>

                <div class="form-footer">
                    <div class="status" id="statusMessage"></div>
                    <div style="display:flex; gap:8px;">
                        <button type="button" class="secondary" id="cancelEditBtn" style="display: none;">
                            Renunță
                        </button>
                        <button type="submit" id="submitBtn">
                            Salvează produs
                        </button>
                    </div>
                </div>
            </form>
        </section>
    </div>
</div>

<script>
    const API_BASE = (window.location.port === '3000' ? 'http://localhost:8080' : '') + '/api/products';

    let products = [];
    let editingId = null;

    const categorySelect = document.getElementById('category');
    const tableBody = document.getElementById('productTableBody');
    const productCount = document.getElementById('productCount');
    const form = document.getElementById('productForm');
    const statusMessage = document.getElementById('statusMessage');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    function setStatus(message, type = '') {
        statusMessage.textContent = message;
        statusMessage.className = 'status ' + type;
    }

    async function loadCategories() {
        try {
            const res = await fetch(API_BASE + '/categories');
            if (!res.ok) throw new Error('Nu pot încărca categoriile');
            const categories = await res.json();
            categorySelect.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat.replace('_', ' ').toLowerCase();
                categorySelect.appendChild(opt);
            });
        } catch (e) {
            console.error(e);
            setStatus('Eroare la încărcarea categoriilor.', 'error');
        }
    }

    async function loadProducts() {
        try {
            const res = await fetch(API_BASE);
            if (!res.ok) throw new Error('Nu pot încărca produsele');
            products = await res.json();
            renderProducts();
        } catch (e) {
            console.error(e);
            setStatus('Eroare la încărcarea produselor.', 'error');
        }
    }

    function renderProducts() {
        tableBody.innerHTML = '';
        products.forEach(p => {
            const tr = document.createElement('tr');

            const price = p.price != null ? p.price.toFixed(2) + ' lei' : '-';

            tr.innerHTML = `
                <td class="muted">${p.sku || '-'}</td>
                <td>
                    <div>${p.name || '-'}</div>
                    <div class="muted">${p.brand || ''}</div>
                </td>
                <td><span class="tag">${(p.category || '').toLowerCase()}</span></td>
                <td class="muted">${p.model || '-'}</td>
                <td class="price">${price}</td>
                <td>
                    <div class="actions">
                        <button class="secondary" onclick="startEdit(${p.id})">Editează</button>
                        <button class="danger" onclick="deleteProduct(${p.id})">Șterge</button>
                    </div>
                </td>
            `;
            tableBody.appendChild(tr);
        });
        productCount.textContent = products.length + (products.length === 1 ? ' produs' : ' produse');
    }

    function getFormValues() {
        return {
            category: categorySelect.value,
            name: document.getElementById('name').value,
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            color: document.getElementById('color').value,
            price: parseFloat(document.getElementById('price').value)
        };
    }

    function setFormValues(product) {
        categorySelect.value = product.category;
        document.getElementById('name').value = product.name || '';
        document.getElementById('brand').value = product.brand || '';
        document.getElementById('model').value = product.model || '';
        document.getElementById('color').value = product.color || '';
        document.getElementById('price').value = product.price != null ? product.price : '';
    }

    function resetForm() {
        form.reset();
        if (categorySelect.options.length > 0) {
            categorySelect.selectedIndex = 0;
        }
        editingId = null;
        formTitle.textContent = 'Adaugă produs';
        formSubtitle.textContent = 'SKU se generează automat';
        submitBtn.textContent = 'Salvează produs';
        cancelEditBtn.style.display = 'none';
        setStatus('');
    }

    window.startEdit = function (id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        editingId = id;
        setFormValues(product);
        formTitle.textContent = 'Editează produs';
        formSubtitle.textContent = `SKU va fi recalculat automat`;
        submitBtn.textContent = 'Actualizează produs';
        cancelEditBtn.style.display = 'inline-flex';
        setStatus('Editezi produsul ' + (product.sku || ''), '');
    };

    window.deleteProduct = async function (id) {
        if (!confirm('Sigur vrei să ștergi acest produs?')) return;
        try {
            const res = await fetch(API_BASE + '/' + id, {method: 'DELETE'});
            if (!res.ok) throw new Error('Nu pot șterge produsul');
            products = products.filter(p => p.id !== id);
            renderProducts();
            setStatus('Produs șters.', 'success');
            if (editingId === id) {
                resetForm();
            }
        } catch (e) {
            console.error(e);
            setStatus('Eroare la ștergerea produsului.', 'error');
        }
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        setStatus('');

        const payload = getFormValues();
        if (!payload.name || !payload.brand || !payload.model || !payload.color || isNaN(payload.price)) {
            setStatus('Te rog completează toate câmpurile.', 'error');
            return;
        }

        submitBtn.disabled = true;

        try {
            let res;
            if (editingId) {
                res = await fetch(API_BASE + '/' + editingId, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            } else {
                res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
            }

            if (!res.ok) {
                const text = await res.text();
                throw new Error(text || 'Eroare la salvare.');
            }

            const saved = await res.json();
            if (editingId) {
                products = products.map(p => p.id === saved.id ? saved : p);
                setStatus('Produs actualizat.', 'success');
            } else {
                products.push(saved);
                setStatus('Produs creat.', 'success');
            }

            renderProducts();
            resetForm();
        } catch (e) {
            console.error(e);
            setStatus('Eroare: ' + e.message, 'error');
        } finally {
            submitBtn.disabled = false;
        }
    });

    cancelEditBtn.addEventListener('click', () => {
        resetForm();
    });

    (async function init() {
        await loadCategories();
        await loadProducts();
    })();
</script>
</body>
</html>
